<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>IDOR Lab — All Users</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0d1117; --surface:#161b22; --border:#30363d; --accent:#f85149; --blue:#58a6ff; --text:#e6edf3; --muted:#8b949e; }
    body { background:var(--bg); color:var(--text); font-family:'Courier New',monospace; padding:2rem; }
    h2 { color:var(--accent); margin-bottom:1.5rem; letter-spacing:2px; font-size:1rem; text-transform:uppercase; }
    table { width:100%; border-collapse:collapse; background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
    th { background:rgba(248,81,73,0.1); color:var(--accent); padding:12px 16px; text-align:left; font-size:0.78rem; text-transform:uppercase; letter-spacing:1px; }
    td { padding:12px 16px; border-top:1px solid var(--border); font-size:0.88rem; color:var(--text); }
    a { color:var(--blue); text-decoration:none; }
    a:hover { text-decoration:underline; }
    .uid { background:rgba(248,81,73,0.15); border:1px solid rgba(248,81,73,0.4); border-radius:4px; padding:2px 8px; color:var(--accent); font-weight:bold; }
    .back { display:inline-block; margin-bottom:1.5rem; color:var(--blue); font-size:0.85rem; }
  </style>
</head>
<body>
  <a class="back" href="javascript:history.back()">← Back</a>
  <h2>👥 All Registered Users</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th><th>Username</th><th>Email</th><th>Bio</th><th>Action</th>
      </tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td><span class="uid">{{ u.id }}</span></td>
        <td>{{ u.username }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.bio }}</td>
        <td><a href="/profile/{{ u.id }}">View Profile</a></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
