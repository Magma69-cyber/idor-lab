<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IDOR Lab — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --accent:   #f85149;
      --green:    #3fb950;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --input-bg: #0d1117;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      width: 380px;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo h1 {
      font-size: 1.4rem;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .logo p {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 10px 12px;
      font-family: inherit;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    button {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      padding: 10px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    .error {
      background: rgba(248,81,73,0.1);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--accent);
      padding: 10px 12px;
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }

    .hint {
      margin-top: 1.2rem;
      background: rgba(63,185,80,0.08);
      border: 1px solid rgba(63,185,80,0.3);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .hint strong { color: var(--green); }

    .hint code {
      background: rgba(255,255,255,0.06);
      padding: 1px 5px;
      border-radius: 3px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>⚠ IDOR LAB</h1>
      <p>Deliberately Vulnerable — For Learning Only</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <label>Username</label>
      <input type="text" name="username" placeholder="alice" required autofocus />

      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required />

      <button type="submit">LOGIN →</button>
    </form>

    <div class="hint">
      <strong>Lab Accounts:</strong><br />
      <code>alice</code> / <code>alice123</code> &nbsp;(User ID: 1)<br />
      <code>bob</code> &nbsp; / <code>bob123</code> &nbsp;&nbsp;&nbsp;(User ID: 2)<br />
      <code>charlie</code> / <code>charlie123</code> (User ID: 3)
    </div>
  </div>
</body>
</html>
